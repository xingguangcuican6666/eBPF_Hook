# Human-readable module metadata for ABK custom external module integration.

ABK_MODULE_ID="ebpf_hook"
ABK_MODULE_NAME="eBPF Hook"
ABK_MODULE_VERSION="0.2.0"
ABK_MODULE_DESCRIPTION="Layered audit-only eBPF control-plane experiment for ABK."
ABK_MODULE_REPO_URL="https://github.com/xingguangcuican6666/eBPF_Hook"
ABK_MODULE_SUPPORTED_STAGES="after_patch"
ABK_MODULE_DEFAULT_STAGE="after_patch"
ABK_MODULE_RECOMMENDED_STAGES="after_patch"

# Default injection level. ABK_EBPF_HOOK_LEVEL from the environment overrides
# this value when the caller supports custom env injection.
ABK_EBPF_HOOK_LEVEL_DEFAULT="L3"
