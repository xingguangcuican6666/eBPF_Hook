name: Build Android 14 eBPF Audit-Only PoC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Custom version suffix"
        type: string
        default: "ebpf-audit-only"
        required: false
      build_time:
        description: "Build timestamp; empty or N uses current UTC"
        type: string
        default: "N"
        required: false

jobs:
  build-a14-6-1-75:
    uses: ./.github/workflows/kernel-a14-6-1.yml
    secrets: inherit
    with:
      version: ${{ inputs.version || 'ebpf-audit-only' }}
      build_time: ${{ inputs.build_time || 'N' }}
