name: Build Kernel - Android 14 (6.1.75)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Custom version suffix"
        required: false
        type: string
        default: "ebpf-audit-only"
      build_time:
        description: "Build timestamp; empty or N uses current UTC"
        required: false
        type: string
        default: "N"
  workflow_call:
    inputs:
      version:
        required: false
        type: string
        default: "ebpf-audit-only"
      build_time:
        required: false
        type: string
        default: "N"

permissions:
  contents: write

jobs:
  build-kernel:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android14"
      kernel_version: "6.1"
      sub_level: "75"
      os_patch_level: "2024-05"
      version: ${{ inputs.version || 'ebpf-audit-only' }}
      build_time: ${{ inputs.build_time || 'N' }}
      upload_aux_artifacts: true
