name: Build Android GKI Kernel

on:
  workflow_call:
    inputs:
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string
      sub_level:
        required: true
        type: string
      os_patch_level:
        required: true
        type: string
      version:
        required: false
        type: string
        default: ""
      build_time:
        required: false
        type: string
        default: "N"
      upload_aux_artifacts:
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl dwarves file flex git gzip \
            libelf-dev libssl-dev lz4 python3 rsync unzip xz-utils zip

      - name: Initialize environment
        run: |
          set -euo pipefail

          config="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}"
          kernel_root="$GITHUB_WORKSPACE/$config"
          artifact_prefix="${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}"

          if [ -n "${{ inputs.version }}" ]; then
            artifact_prefix="$artifact_prefix-${{ inputs.version }}"
          fi

          mkdir -p "$kernel_root" "$GITHUB_WORKSPACE/git-repo"

          curl -L https://storage.googleapis.com/git-repo-downloads/repo \
            -o "$GITHUB_WORKSPACE/git-repo/repo"
          chmod 0755 "$GITHUB_WORKSPACE/git-repo/repo"

          {
            echo "CONFIG=$config"
            echo "KERNEL_ROOT=$kernel_root"
            echo "DEFCONFIG=$kernel_root/common/arch/arm64/configs/gki_defconfig"
            echo "ARTIFACT_PREFIX=$artifact_prefix"
            echo "ANYKERNEL3=$GITHUB_WORKSPACE/AnyKernel3"
            echo "REPO=$GITHUB_WORKSPACE/git-repo/repo"
            echo "AVBTOOL=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/bin/avbtool"
            echo "MKBOOTIMG=$GITHUB_WORKSPACE/mkbootimg/mkbootimg.py"
            echo "BOOT_SIGN_KEY_PATH=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/share/avb/testkey_rsa2048.pem"
          } >> "$GITHUB_ENV"

          echo "$GITHUB_WORKSPACE/git-repo" >> "$GITHUB_PATH"

      - name: Configure ccache
        run: |
          ccache --max-size=2G
          echo "CCACHE_DIR=$HOME/.ccache" >> "$GITHUB_ENV"

      - name: Download packaging tools
        run: |
          set -euo pipefail

          git clone https://android.googlesource.com/kernel/prebuilts/build-tools \
            -b main-kernel-build-2024 --depth 1 kernel-build-tools
          git clone https://android.googlesource.com/platform/system/tools/mkbootimg \
            -b main-kernel-build-2024 --depth 1 mkbootimg
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 > "$BOOT_SIGN_KEY_PATH"

      - name: Clone AnyKernel3
        run: |
          git clone https://github.com/WildKernels/AnyKernel3.git -b gki-2.0 --depth 1 AnyKernel3
          rm -rf AnyKernel3/.git

      - name: Sync Android kernel source
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          set -euo pipefail

          git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-gnu-6.4.1.git gcc

          branch="common-${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.os_patch_level }}"
          "$REPO" init --depth=1 -u https://android.googlesource.com/kernel/manifest -b "$branch" --repo-rev=v2.16

          remote_branch="$(git ls-remote https://android.googlesource.com/kernel/common "${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.os_patch_level }}")"
          if printf '%s' "$remote_branch" | grep -q deprecated; then
            sed -i \
              "s|\"${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.os_patch_level }}\"|\"deprecated/${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.os_patch_level }}\"|g" \
              .repo/manifests/default.xml
          fi

          "$REPO" --trace sync -c -j"$(nproc --all)" --no-tags --fail-fast

      - name: Apply optional stock defconfig
        run: |
          set -euo pipefail

          stock_src="$GITHUB_WORKSPACE/config/stock_defconfig"
          stock_dst="$KERNEL_ROOT/common/arch/arm64/configs/stock_defconfig"
          makefile="$KERNEL_ROOT/common/kernel/Makefile"

          if [ ! -f "$stock_src" ]; then
            exit 0
          fi

          mkdir -p "$(dirname "$stock_dst")"
          cp "$stock_src" "$stock_dst"

          if grep -qF '$(obj)/config_data: $(KCONFIG_CONFIG) FORCE' "$makefile"; then
            sed -i \
              's|$(obj)/config_data: $(KCONFIG_CONFIG) FORCE|$(obj)/config_data: arch/arm64/configs/stock_defconfig FORCE|' \
              "$makefile"
          fi

      - name: Inject local kernel changes
        run: |
          set -euo pipefail
          cp "$DEFCONFIG" "$DEFCONFIG.orig"
          bash "$GITHUB_WORKSPACE/setup.sh"

      - name: Build kernel
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          set -euo pipefail

          input_time="${{ inputs.build_time }}"
          if [ -n "$input_time" ] && [ "$input_time" != "N" ] && [ "$input_time" != "n" ]; then
            build_time="$input_time"
          else
            build_time="$(TZ='UTC' date +'%a %b %d %T %Z %Y')"
          fi

          echo "KBUILD_BUILD_TIMESTAMP=$build_time" >> "$GITHUB_ENV"
          echo "KBUILD_BUILD_VERSION=1" >> "$GITHUB_ENV"

          sed -i 's/BUILD_SYSTEM_DLKM=1/BUILD_SYSTEM_DLKM=0/' common/build.config.gki.aarch64
          sed -i '/MODULES_ORDER=android\/gki_aarch64_modules/d' common/build.config.gki.aarch64
          sed -i '/KMI_SYMBOL_LIST_STRICT_MODE/d' common/build.config.gki.aarch64

          if [ -f build/build.sh ]; then
            LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh CC="/usr/bin/ccache clang"
            dist_dir="out/${{ inputs.android_version }}-${{ inputs.kernel_version }}/dist"
          else
            frag="common/arch/arm64/configs/abk_ebpf_root.fragment"
            diff "$DEFCONFIG.orig" "$DEFCONFIG" | grep '^>' | sed 's/^> //; s/^[[:space:]]*//' > "$frag" || true
            cp "$DEFCONFIG.orig" "$DEFCONFIG"

            frag_flag=""
            if [ -s "$frag" ]; then
              frag_flag="--defconfig_fragment=//common:arch/arm64/configs/abk_ebpf_root.fragment"
            fi

            tools/bazel build --disk_cache=/home/runner/.cache/bazel --config=fast --lto=thin $frag_flag //common:kernel_aarch64_dist
            dist_dir="bazel-bin/common/kernel_aarch64"
          fi

          echo "DIST_DIR=$dist_dir" >> "$GITHUB_ENV"
          strings "$dist_dir/Image" | grep 'Linux version'

      - name: Prepare artifacts
        run: |
          set -euo pipefail

          mkdir -p artifacts bootimgs

          cp "$KERNEL_ROOT/$DIST_DIR/Image" artifacts/
          cp "$KERNEL_ROOT/$DIST_DIR/Image" bootimgs/

          if [ -f "$KERNEL_ROOT/$DIST_DIR/Image.lz4" ]; then
            cp "$KERNEL_ROOT/$DIST_DIR/Image.lz4" artifacts/
          fi

          if [ -d "$KERNEL_ROOT/out/abk-ebpf-root" ]; then
            cp -r "$KERNEL_ROOT/out/abk-ebpf-root" artifacts/abk-ebpf-root
          fi

      - name: Package AnyKernel3
        run: |
          set -euo pipefail

          cp artifacts/Image "$ANYKERNEL3/Image"
          (
            cd "$ANYKERNEL3"
            zip -r "$GITHUB_WORKSPACE/artifacts/$ARTIFACT_PREFIX-AnyKernel3.zip" ./*
          )

      - name: Build boot image
        working-directory: bootimgs
        run: |
          set -euo pipefail

          python3 "$MKBOOTIMG" --header_version 4 --kernel Image --output boot.img
          "$AVBTOOL" add_hash_footer \
            --partition_name boot \
            --partition_size $((64 * 1024 * 1024)) \
            --image boot.img \
            --algorithm SHA256_RSA2048 \
            --key "$BOOT_SIGN_KEY_PATH"

          cp boot.img "$GITHUB_WORKSPACE/artifacts/$ARTIFACT_PREFIX-boot.img"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_PREFIX }}
          path: artifacts
          if-no-files-found: error
